# TEMP: verbose logging for diagnosing unstable MongoDB incremental-snapshot tests.
# Revert rootLogger.level back to ERROR before merging.
rootLogger.level=INFO
rootLogger.appenderRef.test.ref = TestLogger

appender.testlogger.name = TestLogger
appender.testlogger.type = CONSOLE
appender.testlogger.target = SYSTEM_ERR
appender.testlogger.layout.type = PatternLayout
appender.testlogger.layout.pattern = %-4r [%t] %-5p %c - %m%n

# --- TEMP debug loggers (remove before merging) ---
# MongoDB CDC connector: change stream, fetch tasks, snapshot splitters
logger.cdcmongo.name = org.apache.flink.cdc.connectors.mongodb
logger.cdcmongo.level = DEBUG
# Incremental snapshot framework: split assigner & split reader lifecycle
logger.cdcbase.name = org.apache.flink.cdc.connectors.base
logger.cdcbase.level = DEBUG
# Debezium MongoDB change stream internals
logger.debezium.name = io.debezium
logger.debezium.level = DEBUG
# Mongo driver: surfaces server selection / heartbeat / connection stalls
logger.mongocluster.name = org.mongodb.driver.cluster
logger.mongocluster.level = DEBUG
logger.mongoconn.name = org.mongodb.driver.connection
logger.mongoconn.level = DEBUG
